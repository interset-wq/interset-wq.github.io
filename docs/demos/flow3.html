<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow3</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        .leftfix {
            float: left;
        }
        .rightfix {
            float: right;
        }
        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }
        
        /* 父容器 */
        .container {
            /* 排版总体居中 */
            margin: 0 auto;
            /* 页面宽度 */
            width: 960px;
            /* 通过继承使所有文字水平居中 */
            text-align: center;
        }

        /* 头部 */
        .logo, .banner1, .banner2 {
            height: 80px;
            line-height: 80px;
            background-color: #ccc;
        }
        .logo {
            width: 200px;
        }
        .banner1 {
            width: 540px;
            margin: 0 10px;
        }
        .banner2 {
            width: 200px;
        }

        /* 菜单 */
        .menu {
            background-color: #ccc;
            width: 960px;
            height: 30px;
            line-height: 30px;
            margin-top: 10px;
        }

        /* 左侧内容区第一行 */
        .item1, .item2 {
            border: 1px solid black;
            width: 368px;
            height: 200px;
            line-height: 200px;
            margin-right: 10px;
            margin-top: 10px;
        }

        /* 左侧内容区第二行 */
        .item3, .item4, .item5, .item6 {
            border: 1px solid black;
            height: 200px;
            width: 178px;
            line-height: 200px;
            margin-top: 10px;
            margin-right: 10px;
        }

        /* 右侧内容区 */
        .item7, .item8, .item9 {
            width: 198px;
            border: 1px solid black;
            height: 130px;
            line-height: 130px;
            margin-top: 10px;
        }

        /* 页脚 */
        .footer {
            background-color: #ccc;
            height: 60px;
            width: 960px;
            line-height: 60px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="page-header clearfix">
            <div class="logo leftfix">logo</div>
            <div class="banner1 leftfix">banner1</div>
            <div class="banner2 leftfix">banner2</div>
        </div>
        <!-- 目录 -->
        <div class="menu">菜单</div>
        <!-- 内容区 -->
        <div class="content clearfix">
            <!-- 左侧内容区 -->
            <div class="left leftfix clearfix">
                <!-- 左侧内容区第一行 -->
                <div class="top clearfix">
                    <div class="item1 leftfix">栏目一</div>
                    <div class="item2 leftfix">栏目二</div>
                </div>
                <!-- 左侧内容区第二行 -->
                <div class="bottom clearfix">
                    <div class="item3 leftfix">栏目三</div>
                    <div class="item4 leftfix">栏目四</div>
                    <div class="item5 leftfix">栏目五</div>
                    <div class="item6 leftfix">栏目六</div>
                </div>
            </div>

            <!-- 右侧内容区 -->
            <div class="right leftfix">
                <div class="item7">栏目七</div>
                <div class="item8">栏目八</div>
                <div class="item9">栏目九</div>
            </div>
        </div>
        <!-- 页脚 -->
        <div class="footer">页脚</div>
    </div>
</body>
</html>
