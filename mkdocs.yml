# 插件
plugins:
  - search # 搜索插件
  - meta # 元插件
  - blog: # 博客插件
      blog_dir: blog # 博客文章路径
      blog_toc: true # 博客目录
      post_date_format: full # 博客日期格式（元数据）
      post_url_date_format: yyyy/MM # 博客文章URL
  - tags # 博客文章标签
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     enabled: true
  #     type: iso_date
  #     fallback_to_build_date: true
  #     enable_git_follow: false
  # rss插件
