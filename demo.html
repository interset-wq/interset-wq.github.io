<!DOCTYPE html> <!-- html文档声明，必须放在第一行，用来告诉浏览器当前网页的版本 -->
<html lang="zh-CN"> <!-- 网页所用的语言，方便浏览器提供翻译提示以及搜索引擎优化 -->

<head>
    <!-- head 标签中的内容不会出现在网页中 -->
    <meta charset="UTF-8"> <!-- 使用的字符编码 -->
    <title>Document</title> <!-- 将网页标题写在title标签中 -->
</head>

<body>
    <!-- 想要呈现在网页中的内容写在 body 标签中 -->
</body>

</html>
