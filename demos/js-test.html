<body>
    <script>
        // 生成0到10之间的随机整数
        Math.floor(Math.random * 11)
        // 生成5到10之间的随机整数
        Math.floor(Math.random * 6) + 5
        // 生成N到M之间的随机整数
        Math.floor(Math.random * (M - N + 1)) + N + 5

    </script>
