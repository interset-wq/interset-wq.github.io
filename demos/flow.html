<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow</title>
    <style>
        .outer {
            width: 400px;
            /* 设置border属性防止margin塌陷 */
            border: 1px solid pink; 
            background-color: grey;
        }
        .box {
            width: 100px;
            height: 100px;
            margin: 10px;
        }
        /* Example 1 */
        .box1-1 {
            background-color: blue;
            float: right;
        }
        .box2-1 {
            background-color: yellow;
        }
        .box3-1 {
            background-color: red;
        }

        /* Example 2 */
        .box1-2 {
            background-color: blue;
            float: left;
        }
        .box2-2 {
            background-color: yellow;
        }
        .box3-2 {
            background-color: red;
        }

        /* Example 3 */
        .box1-3 {
            background-color: blue;
            float: left;
        }
        .box2-3 {
            background-color: yellow;
            float: left;
        }
        .box3-3 {
            background-color: red;
            float: left;
        }

        /* Example 4 */
        .box1-4 {
            background-color: blue;
            float: left;
        }
        .box2-4 {
            background-color: yellow;
            float: left;
        }
        .box3-4 {
            background-color: red;
            float: left;
        }

    </style>
</head>
<body>
    <h1>This is a demo to learn "Flow".</h1>
    <hr>
    <h2>Example 1 box1-1右浮动</h2>
    <div class="outer">
        <div class="box box1-1">1-1</div>
        <div class="box box2-1">2-1</div>
        <div class="box box3-1">3-1</div>
    </div>
    <hr>
    <h2>Example 2 box1-1左浮动，导致box1-2覆盖box2-2，box2-2的文字被挤到box3-2中</h2>
    <div class="outer">
        <div class="box box1-2">1-2</div>
        <div class="box box2-2">2-2</div>
        <div class="box box3-2">3-2</div>
    </div>
    <hr>
    <h2>Example 3 三个盒子都左浮动，导致父容器高度为0，变成了只有边框</h2>
    <div class="outer">
        <div class="box box1-3">1-3</div>
        <div class="box box2-3">2-3</div>
        <div class="box box3-3">3-3</div>
    </div>    
</body>
</html>
